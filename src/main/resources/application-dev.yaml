# Profile dev: chạy app trên máy local (Maven/IDE), không chạy cart-service trong Docker.
# Hạ tầng MySQL/Redis/RabbitMQ vẫn có thể bật bằng docker compose (chỉ infra).

spring:
  datasource:
    url: jdbc:mysql://localhost:3310/bookstore_cart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: bookstore
    password: bookstore
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

book-service:
  url: http://localhost:8082

saga:
  enabled: true
  exchange-commands: bookstore.commands
  exchange-events: bookstore.events
  queue-cart-commands: cart.commands.queue
  rk-cart-clear-command: cart.clear.command
  rk-cart-cleared: cart.cleared

logging:
  level:
    com.notfound.cartservice: DEBUG
    com.notfound.cartservice.messaging: DEBUG
