server:
  port: 8080

spring:
  application:
    name: bookstore-cart-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://cart-db:3306/bookstore_cart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:bookstore}
    password: ${SPRING_DATASOURCE_PASSWORD:bookstore}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:cart-redis}
      port: ${REDIS_PORT:6379}
      timeout: 3000

book-service:
  url: ${BOOK_SERVICE_URL:http://book-service:8080}

cart:
  ttl-days: ${CART_TTL_DAYS:7}
  max-items-per-cart: 100

logging:
  level:
    com.notfound.cartservice: INFO
